<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/widgets.css">
</head>
<body class="widget-page">
  <main class="widget-shell">
    <header class="widget-header">
      <div class="widget-title-group">
        <div class="widget-icon">☁</div>
        <div>
          <h1 class="widget-title">Weather</h1>
          <p class="widget-subtitle">Current conditions and 5-step forecast</p>
        </div>
      </div>
      <div id="weather-status" class="widget-status">Fetching</div>
    </header>
    <section class="widget-content split-grid">
      <article class="forecast-card">
        <div class="weather-current">
          <div>
            <div id="weather-city" class="metric-label">City</div>
            <div id="weather-temp" class="weather-temp">--</div>
            <div id="weather-condition" class="weather-condition">Loading conditions</div>
          </div>
          <img id="weather-icon" class="weather-icon" alt="Weather icon">
        </div>
      </article>
      <article class="forecast-card">
        <div id="forecast-grid" class="forecast-grid"></div>
      </article>
    </section>
  </main>
  <script src="../js/widget-core.js"></script>
  <script src="../js/api-utils.js"></script>
  <script src="../js/weather-api.js"></script>
  <script>
    (function () {
      var forecastGrid = document.getElementById("forecast-grid");
      var widget = {
        refreshInterval: 600000,
        initWidget: function () {},
        updateWidget: async function () {
          try {
            var weather = await WeatherApi.fetchWeather();
            document.getElementById("weather-city").textContent = weather.city;
            document.getElementById("weather-temp").textContent = weather.temperature + "°";
            document.getElementById("weather-condition").textContent = weather.condition;
            document.getElementById("weather-icon").src = WeatherApi.getWeatherIconUrl(weather.icon);
            document.getElementById("weather-status").textContent = weather.source;
            forecastGrid.innerHTML = weather.forecast.map(function (entry) {
              return '<div class="forecast-entry"><strong>' + entry.hour + '</strong><span>' + entry.condition + '</span><strong>' + entry.temp + '°</strong></div>';
            }).join("");
          } catch (error) {
            document.getElementById("weather-status").textContent = "Weather unavailable";
          }
        },
        destroyWidget: function () {
          if (this.__interval) {
            clearInterval(this.__interval);
          }
        }
      };
      WidgetCore.mountWidget(widget);
    }());
  </script>
</body>
</html>
