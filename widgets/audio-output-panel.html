<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: rgba(18, 26, 38, 0.88);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e6edf3;
      --muted: #94a3b8;
      --accent: #00e0ff;
      --good: #44d17a;
      --warn: #ffb347;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    body {
      padding: 14px;
    }

    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      height: 100%;
      min-height: 0;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.25rem;
      line-height: 1.1;
    }

    p {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .status {
      min-width: 92px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-align: center;
    }

    .content {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 14px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      overflow: auto;
    }

    .metric-grid {
      display: grid;
      gap: 10px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 1.2rem;
      line-height: 1.1;
    }

    .volume {
      width: 100%;
      margin-top: 12px;
      accent-color: var(--accent);
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .row strong,
    .row span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .action {
      min-width: 88px;
      padding: 9px 12px;
      border: 1px solid rgba(0, 224, 255, 0.32);
      border-radius: 8px;
      background: rgba(0, 224, 255, 0.08);
    }

    .action:disabled {
      cursor: default;
      opacity: 0.5;
    }

    .bar {
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--value);
      background: var(--accent);
    }

    .empty {
      padding: 20px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <div>
        <p class="eyebrow">Audio</p>
        <h1>Quick audio control</h1>
        <p>Master volume, output switching, and apps that are actually making sound.</p>
      </div>
      <div id="status" class="status">Loading</div>
    </section>
    <section class="content">
      <article class="panel">
        <div class="metric-grid">
          <div class="metric">
            <p class="eyebrow">Output</p>
            <strong id="current-output">--</strong>
            <p id="current-output-copy">Default device</p>
          </div>
          <div class="metric">
            <p class="eyebrow">Volume</p>
            <strong id="volume-label">--</strong>
            <input id="volume" class="volume" type="range" min="0" max="100" value="0">
          </div>
        </div>
      </article>
      <article class="panel">
        <div class="list" id="outputs"></div>
        <div style="height:14px"></div>
        <p class="eyebrow">Active apps</p>
        <div class="list" id="sessions"></div>
      </article>
    </section>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var endpoint = params.get("endpoint") || "/api/audio";
      var actionBase = params.get("actionBase") || "/api/audio";
      var volume = document.getElementById("volume");
      var statusNode = document.getElementById("status");
      var data = null;
      var volumeTimer = 0;

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function percent(value) {
        var parsed = Number(value);
        return Number.isFinite(parsed) ? Math.round(parsed) : 0;
      }

      function label(value, fallback) {
        return typeof value === "string" && value.trim() ? value.trim() : fallback;
      }

      function request(url, options) {
        var init = Object.assign({ cache: "no-store" }, options || {});
        if (init.body && typeof init.body !== "string") {
          init.headers = Object.assign({ "Content-Type": "application/json" }, init.headers || {});
          init.body = JSON.stringify(init.body);
        }

        return fetch(url, init).then(function (response) {
          if (!response.ok) {
            throw new Error("Request failed");
          }
          return response.json();
        });
      }

      function isActiveSession(session) {
        var name = label(session.appName || session.name || session.displayName, "");
        var peak = Number(session.peak || session.level || session.volume || 0);
        return name && !session.isInput && peak > 0;
      }

      function render(payload) {
        var devices = Array.isArray(payload.devices) ? payload.devices : [];
        var sessions = Array.isArray(payload.sessions) ? payload.sessions.filter(isActiveSession).slice(0, 4) : [];
        var current = devices.filter(function (device) { return device.isDefault; })[0] || {};
        var master = percent(payload.masterVolume != null ? payload.masterVolume : payload.volume);

        data = payload;
        statusNode.textContent = payload.supported === false ? "Unavailable" : "Ready";
        document.getElementById("current-output").textContent = label(current.name || payload.defaultDeviceName, "Default output");
        document.getElementById("current-output-copy").textContent = label(current.deviceType || current.id, "Windows default device");
        document.getElementById("volume-label").textContent = master + "%";
        volume.value = String(master);

        document.getElementById("outputs").innerHTML = devices.slice(0, 5).map(function (device) {
          var isDefault = Boolean(device.isDefault);
          return '' +
            '<button class="row" type="button" data-device-id="' + escapeHtml(device.id || "") + '"' + (isDefault ? " disabled" : "") + '>' +
              '<span><strong>' + escapeHtml(label(device.name, "Audio output")) + '</strong><span>' + escapeHtml(isDefault ? "Current output" : "Tap to switch") + '</span></span>' +
              '<span class="action">' + escapeHtml(isDefault ? "Active" : "Switch") + '</span>' +
            '</button>';
        }).join("") || '<div class="empty">No audio outputs found.</div>';

        document.getElementById("sessions").innerHTML = sessions.map(function (session) {
          var sessionVolume = percent(session.volume);
          return '' +
            '<div class="row">' +
              '<span><strong>' + escapeHtml(label(session.appName || session.name, "App")) + '</strong><span>' + escapeHtml(sessionVolume + "% volume") + '</span><span class="bar" style="--value:' + sessionVolume + '%"><span></span></span></span>' +
              '<span class="action">Active</span>' +
            '</div>';
        }).join("") || '<div class="empty">No apps are playing audio.</div>';
      }

      function refresh() {
        return request(endpoint).then(render, function (error) {
          statusNode.textContent = error.message || "Unavailable";
        });
      }

      volume.addEventListener("input", function () {
        document.getElementById("volume-label").textContent = volume.value + "%";
        window.clearTimeout(volumeTimer);
        volumeTimer = window.setTimeout(function () {
          request(actionBase + "/master-volume", {
            method: "POST",
            body: { volume: Number(volume.value) }
          }).then(refresh, refresh);
        }, 180);
      });

      document.getElementById("outputs").addEventListener("click", function (event) {
        var button = event.target.closest("[data-device-id]");
        var id = button ? button.getAttribute("data-device-id") : "";
        if (!id) {
          return;
        }

        request(actionBase + "/default-device", {
          method: "POST",
          body: { deviceId: id }
        }).then(refresh, refresh);
      });

      refresh();
      window.setInterval(refresh, 5000);
    }());
  </script>
</body>
</html>
