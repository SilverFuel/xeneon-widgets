<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Widget</title>
  <link rel="stylesheet" href="../css/theme.css?v=20260425-5">
  <link rel="stylesheet" href="../css/widgets.css?v=20260425-5">
</head>
<body class="widget-page">
  <main class="widget-shell">
    <header class="widget-header">
      <div class="widget-title-group">
        <div class="widget-icon">♫</div>
        <div>
          <h1 class="widget-title">Media</h1>
          <p class="widget-subtitle">Reserved for a future live media endpoint</p>
        </div>
      </div>
      <div class="widget-status">Needs setup</div>
    </header>

    <section class="widget-content media-layout">
      <img
        class="album-art"
        alt="Media placeholder art"
        src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 600'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23050b12'/%3E%3Cstop offset='100%25' stop-color='%23152c3a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='600' height='600' rx='48' fill='url(%23bg)'/%3E%3Ccircle cx='300' cy='230' r='96' fill='%2300e0ff' fill-opacity='.14'/%3E%3Ccircle cx='300' cy='230' r='44' fill='%2300e0ff' fill-opacity='.76'/%3E%3Crect x='132' y='360' width='336' height='24' rx='12' fill='%23e6edf3' fill-opacity='.16'/%3E%3Crect x='170' y='414' width='260' height='18' rx='9' fill='%23e6edf3' fill-opacity='.1'/%3E%3Ctext x='300' y='108' fill='%238b9aab' font-family='Inter,Roboto,system-ui,sans-serif' font-size='28' text-anchor='middle' letter-spacing='8'%3EMEDIA%3C/text%3E%3C/svg%3E">
      <article class="media-meta">
        <div>
          <div class="media-title">Live media endpoint required</div>
          <div class="media-artist">This panel stays hidden from the main dashboard until a real integration is added.</div>
        </div>
        <div class="progress-track"><span style="width:0"></span></div>
        <div class="media-controls">
          <button class="control-button" type="button" disabled>Prev</button>
          <button class="control-button is-primary" type="button" disabled>Play</button>
          <button class="control-button" type="button" disabled>Next</button>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
