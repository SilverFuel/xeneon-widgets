<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/widgets.css">
</head>
<body class="widget-page">
  <main class="widget-shell">
    <header class="widget-header">
      <div class="widget-title-group">
        <div class="widget-icon">🕒</div>
        <div>
          <h1 class="widget-title">Clock</h1>
          <p class="widget-subtitle">Local time and date</p>
        </div>
      </div>
      <div class="widget-status">Live</div>
    </header>
    <section class="widget-content clock-face">
      <div id="clock-time" class="clock-time">--:--</div>
      <div id="clock-date" class="clock-date">Loading date</div>
    </section>
  </main>
  <script src="../js/widget-core.js"></script>
  <script>
    (function () {
      var timeNode = document.getElementById("clock-time");
      var dateNode = document.getElementById("clock-date");
      var widget = {
        refreshInterval: 1000,
        initWidget: function () {},
        updateWidget: function () {
          var now = new Date();
          timeNode.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
          dateNode.textContent = now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric", year: "numeric" });
        },
        destroyWidget: function () {
          if (this.__interval) {
            clearInterval(this.__interval);
          }
        }
      };
      WidgetCore.mountWidget(widget);
    }());
  </script>
</body>
</html>
