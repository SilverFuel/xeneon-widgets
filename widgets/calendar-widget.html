<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/widgets.css">
</head>
<body class="widget-page">
  <main class="widget-shell">
    <header class="widget-header">
      <div class="widget-title-group">
        <div class="widget-icon">🗓</div>
        <div>
          <h1 class="widget-title">Calendar</h1>
          <p class="widget-subtitle">Agenda view for today</p>
        </div>
      </div>
      <div class="widget-status">Local schedule</div>
    </header>
    <section class="widget-content split-grid">
      <article class="list-card">
        <div class="metric-label">Today</div>
        <div id="calendar-day" class="metric-value">--</div>
        <div id="calendar-date" class="metric-detail">Loading date</div>
      </article>
      <article class="list-card">
        <div id="agenda-list" class="agenda-list"></div>
      </article>
    </section>
  </main>
  <script src="../js/widget-core.js"></script>
  <script>
    (function () {
      var agendaItems = [
        { time: "09:00", title: "Sprint standup", detail: "Status review" },
        { time: "11:30", title: "Design sync", detail: "Widget layout pass" },
        { time: "14:00", title: "Benchmarks", detail: "iFrame performance test" },
        { time: "16:30", title: "Deploy", detail: "Publish to GitHub Pages" }
      ];
      var widgetSize = WidgetCore.getWidgetSize();
      var widget = {
        refreshInterval: 60000,
        initWidget: function () {
          var itemCount = widgetSize === "small" ? 2 : widgetSize === "medium" ? 3 : 4;
          document.getElementById("agenda-list").innerHTML = agendaItems.slice(0, itemCount).map(function (item) {
            return '<div class="agenda-item"><div><strong>' + item.title + '</strong><span>' + item.detail + '</span></div><strong>' + item.time + '</strong></div>';
          }).join("");
        },
        updateWidget: function () {
          var now = new Date();
          document.getElementById("calendar-day").textContent = now.toLocaleDateString([], { weekday: "long" });
          document.getElementById("calendar-date").textContent = now.toLocaleDateString([], { month: "long", day: "numeric", year: "numeric" });
        },
        destroyWidget: function () {
          if (this.__interval) {
            clearInterval(this.__interval);
          }
        }
      };
      WidgetCore.mountWidget(widget);
    }());
  </script>
</body>
</html>
