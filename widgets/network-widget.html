<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Widget</title>
  <link rel="stylesheet" href="../css/theme.css?v=20260425-25">
  <link rel="stylesheet" href="../css/widgets.css?v=20260425-25">
  <style>
    .widget-header--compact {
      justify-content: flex-end;
    }

    .network-grid,
    .network-unifi-grid {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .network-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      height: 100%;
    }

    .network-unifi-grid {
      grid-column: 1 / -1;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .network-unifi-card {
      grid-column: 1 / -1;
      display: grid;
      gap: 14px;
    }

    .network-unifi-card__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .network-pill {
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #bfffe1;
      background: rgba(68, 209, 122, 0.16);
      font-size: 0.72rem;
    }

    @media (max-width: 1100px) {
      .network-grid,
      .network-unifi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .network-grid,
      .network-unifi-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="widget-page">
  <main class="widget-shell">
    <header class="widget-header widget-header--compact">
      <div id="network-status" class="widget-status">Measuring</div>
    </header>
    <section class="widget-content network-grid">
      <article class="metric-card">
        <div class="metric-label">Download</div>
        <div id="download-speed" class="metric-value">--</div>
        <div class="metric-detail">Live throughput</div>
      </article>
      <article class="metric-card">
        <div class="metric-label">Upload</div>
        <div id="upload-speed" class="metric-value">--</div>
        <div class="metric-detail">Live throughput</div>
      </article>
      <article class="metric-card">
        <div class="metric-label">Ping</div>
        <div id="ping-speed" class="metric-value">--</div>
        <div class="metric-detail">Round-trip latency</div>
      </article>
      <article class="metric-card">
        <div class="metric-label">Connection</div>
        <div id="network-connection" class="metric-value">--</div>
        <div id="network-detail" class="metric-detail">Native host</div>
      </article>

      <article id="network-unifi-card" class="list-card network-unifi-card is-hidden">
        <div class="network-unifi-card__header">
          <div>
            <div class="metric-label">UniFi</div>
            <div id="network-unifi-name" class="metric-value">--</div>
            <div id="network-unifi-detail" class="metric-detail">Local UniFi detected</div>
          </div>
          <div class="network-pill">Detected</div>
        </div>
        <div class="network-unifi-grid">
          <div class="inline-kpi"><strong id="network-unifi-clients">--</strong><span>Clients</span></div>
          <div class="inline-kpi"><strong id="network-unifi-wifi">--</strong><span>Wi-Fi</span></div>
          <div class="inline-kpi"><strong id="network-unifi-wired">--</strong><span>Wired</span></div>
          <div class="inline-kpi"><strong id="network-unifi-aps">--</strong><span>APs</span></div>
        </div>
      </article>
    </section>
  </main>
  <script src="../js/widget-core.js?v=20260425-25"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var endpoint = params.get("endpoint") || "";
      var unifiEndpoint = params.get("unifiEndpoint") || "/api/unifi/network";

      function fetchJson(url) {
        return fetch(url, { cache: "no-store" }).then(function (response) {
          if (!response.ok) {
            throw new Error("Request failed with status " + response.status);
          }

          return response.json();
        });
      }

      function getLocalNetworkSnapshot() {
        var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        var downlink = connection && typeof connection.downlink === "number" ? connection.downlink : null;
        var ping = connection && typeof connection.rtt === "number" ? connection.rtt : null;
        var type = connection && connection.effectiveType ? connection.effectiveType : "Unknown";
        return {
          download: downlink,
          upload: null,
          ping: ping,
          type: type,
          source: connection ? "Browser estimate" : "Native host"
        };
      }

      function normalizeUniFiSnapshot(raw) {
        var data = raw || {};
        var clients = data.clients || {};
        return {
          detected: Boolean(data.detected),
          gateway: data.gateway || "UniFi Gateway",
          provider: data.provider || "",
          clients: {
            total: Number(clients.total || 0),
            wifi: Number(clients.wifi || 0),
            wired: Number(clients.wired || 0)
          },
          aps: Array.isArray(data.aps) ? data.aps : []
        };
      }

      function renderUniFi(snapshot) {
        var card = document.getElementById("network-unifi-card");
        if (!snapshot || !snapshot.detected) {
          card.classList.add("is-hidden");
          return;
        }

        card.classList.remove("is-hidden");
        document.getElementById("network-unifi-name").textContent = snapshot.gateway;
        document.getElementById("network-unifi-detail").textContent = snapshot.provider || "Local UniFi detected";
        document.getElementById("network-unifi-clients").textContent = String(snapshot.clients.total);
        document.getElementById("network-unifi-wifi").textContent = String(snapshot.clients.wifi);
        document.getElementById("network-unifi-wired").textContent = String(snapshot.clients.wired);
        document.getElementById("network-unifi-aps").textContent = String(snapshot.aps.length);
      }

      var widget = {
        refreshInterval: 4000,
        initWidget: function () {},
        updateWidget: async function () {
          var snapshot;
          var sourceText = "Live";

          if (endpoint) {
            try {
              snapshot = await fetchJson(endpoint);
              sourceText = snapshot.source || "Local bridge";
            } catch (error) {
              snapshot = getLocalNetworkSnapshot();
              sourceText = "Unavailable";
            }
          } else {
            snapshot = getLocalNetworkSnapshot();
            sourceText = snapshot.source || "Live";
          }

          document.getElementById("download-speed").textContent = WidgetCore.formatBytesPerSecond(snapshot.download);
          document.getElementById("upload-speed").textContent = WidgetCore.formatBytesPerSecond(snapshot.upload);
          document.getElementById("ping-speed").textContent = typeof snapshot.ping === "number" && isFinite(snapshot.ping) ? Math.round(snapshot.ping) + " ms" : "--";
          document.getElementById("network-connection").textContent = snapshot.type || "--";
          document.getElementById("network-detail").textContent = snapshot.source || "Native host";

          try {
            var unifi = normalizeUniFiSnapshot(await fetchJson(unifiEndpoint));
            renderUniFi(unifi);
            if (unifi.detected) {
              sourceText = "UniFi detected";
            }
          } catch (error) {
            renderUniFi(null);
          }

          document.getElementById("network-status").textContent = sourceText;
        },
        destroyWidget: function () {
          if (this.__interval) {
            clearInterval(this.__interval);
          }
        }
      };
      WidgetCore.mountWidget(widget);
    }());
  </script>
</body>
</html>
