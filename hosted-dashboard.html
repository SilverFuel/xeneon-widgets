<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XENEON Hosted Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/theme.css?v=20260425-5">
  <link rel="stylesheet" href="./css/widgets.css?v=20260425-5">
</head>
<body class="dashboard-native-page">
  <div class="dashboard-stage-shell">
    <main class="native-dashboard dashboard-stage hosted-weather-stage">
      <section class="dash-card dash-card--hosted-weather">
        <header class="dash-card__header">
          <div class="dash-card__title-group">
            <div class="widget-icon">☁</div>
            <div>
              <h1 class="dash-card__title">Weather</h1>
              <p class="widget-subtitle">Hosted preview</p>
            </div>
          </div>
          <div id="hosted-weather-source" class="widget-status">Ready</div>
        </header>

        <div id="hosted-weather-live" class="hosted-weather-layout is-hidden">
          <section class="hosted-weather-current">
            <div class="hosted-weather-current__copy">
              <div id="hosted-weather-city" class="metric-label">City</div>
              <div id="hosted-weather-temp" class="hosted-weather-current__temp">--°</div>
              <div id="hosted-weather-condition" class="hosted-weather-current__condition">Loading conditions</div>
            </div>
            <img id="hosted-weather-icon" class="hosted-weather-current__icon" alt="Weather icon">
          </section>

          <section class="hosted-weather-forecast">
            <div id="hosted-weather-forecast" class="hosted-weather-forecast__grid"></div>
          </section>
        </div>

        <section id="hosted-weather-empty" class="hosted-empty-state">
          <div class="hosted-empty-state__eyebrow">Hosted Weather</div>
          <h2 class="hosted-empty-state__title">Weather is configured in Xenon setup</h2>
          <p class="hosted-empty-state__copy">Keys stay inside the Windows app instead of the browser address bar.</p>
          <code id="hosted-weather-url" class="hosted-empty-state__code">http://127.0.0.1:8976/dashboard.html?widget=setup</code>
        </section>
      </section>
    </main>
  </div>

  <script src="./js/widget-core.js?v=20260425-5"></script>
  <script src="./js/api-utils.js?v=20260425-5"></script>
  <script src="./js/weather-api.js?v=20260425-5"></script>
  <script src="./js/hosted-dashboard.js?v=20260425-5"></script>
</body>
</html>
